<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Website Disabled</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background: #0f1724;
    color: #f1f5f9;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }

  .card {
    max-width: 680px;
    padding: 36px;
    border-radius: 20px;
    background: #0b1220;
    box-shadow: 0 20px 50px rgba(2, 6, 23, 0.85);
    border: 1px solid rgba(148, 163, 184, 0.15);
  }

  h1 {
    margin: 0 0 16px;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
  }

  p {
    margin: 0 0 18px;
    font-size: 17px;
    line-height: 1.65;
    color: #e2e8f0;
  }

  .notice {
    padding: 16px 18px;
    border-radius: 12px;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.35);
    color: #fecaca;
    font-weight: 600;
  }

  a {
    color: #ffffff;
    font-weight: 700;
    text-decoration: underline;
  }

</head>
<body>
  <div class="card">
    <h1></h1>

    <div class="notice">
